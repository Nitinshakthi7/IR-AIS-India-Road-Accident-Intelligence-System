steps:
  # Build the Docker image
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'gcr.io/$PROJECT_ID/irias-project:$COMMIT_SHA'
      - '-t'
      - 'gcr.io/$PROJECT_ID/irias-project:latest'
      - '.'

  # Push to Google Container Registry
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - 'gcr.io/$PROJECT_ID/irias-project:$COMMIT_SHA'

  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - 'gcr.io/$PROJECT_ID/irias-project:latest'

  # Deploy to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'irias-project'
      - '--image=gcr.io/$PROJECT_ID/irias-project:$COMMIT_SHA'
      - '--region=us-central1'
      - '--platform=managed'
      - '--allow-unauthenticated'
      - '--port=8080'
      - '--memory=2Gi'
      - '--cpu=2'
      - '--timeout=60'
      - '--concurrency=10'

images:
  - 'gcr.io/$PROJECT_ID/irias-project:$COMMIT_SHA'
  - 'gcr.io/$PROJECT_ID/irias-project:latest'
